spring.application.name=chemiconsult
#H2 Database Configuration
spring.h2.console.enabled=true
spring.jpa.defer-datasource-initialization=true

spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.url=jdbc:h2:mem:testdb;NON_KEYWORDS=VALUE;MAX_LENGTH_INPLACE_LOB=10485760
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# add to src/main/resources/application.properties (or application-test.properties)
logging.level.org.springframework.security=DEBUG
jwt.secret=your_very_secure_secret_key_with_at_least_32_characters
jwt.expiration=3600000
