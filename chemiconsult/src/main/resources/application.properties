#MySQL Database Configuration
# src/main/resources/application.properties
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}


# ── JPA / Hibernate ────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Le decimos explícitamente que es Postgres
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.maximum-pool-size=5


# ── Carga inicial ──────────────────────────────
spring.sql.init.mode=always
spring.sql.init.platform=postgresql
# CRÍTICO: espera a que Hibernate cree las tablas antes de ejecutar data.sql
spring.jpa.defer-datasource-initialization=true
# MySQL necesita esto para que el script no falle en statements individuales
spring.sql.init.continue-on-error=true

# ── Seguridad ──────────────────────────────────
logging.level.org.springframework.security=DEBUG
jwt.secret=your_very_secure_secret_key_with_at_least_32_characters
jwt.expiration=3600000
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-timeout=30000
# add to src/main/resources/application.properties (or application-test.properties)
